<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stellium — Find Your Rave</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #09090f;
    --surface: #0f0f1a;
    --gold: #c9a96e;
    --gold-dim: #7a6040;
    --cream: #f0e8d8;
    --muted: #5a5570;
    --white: #ffffff;
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--cream);
    font-family: 'Cormorant Garamond', Georgia, serif;
    overflow-x: hidden;
  }

  /* Stars */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    opacity: 0;
    animation: twinkle var(--dur) ease-in-out infinite var(--delay);
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: var(--op); transform: scale(1); }
  }

  /* Layout */
  .screen {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.5rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.8s ease;
    position: fixed;
    inset: 0;
    overflow-y: auto;
  }
  .screen.active {
    opacity: 1;
    pointer-events: all;
    position: relative;
    inset: auto;
  }

  /* Intro */
  .intro-eyebrow {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.35em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 2.5rem;
    opacity: 0;
    animation: fadeUp 1s ease 0.3s forwards;
  }
  .intro-title {
    font-size: clamp(2.8rem, 7vw, 5rem);
    font-weight: 300;
    font-style: italic;
    line-height: 1.1;
    text-align: center;
    color: var(--cream);
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadeUp 1s ease 0.6s forwards;
  }
  .intro-body {
    font-size: 1.15rem;
    font-weight: 300;
    line-height: 1.9;
    text-align: center;
    max-width: 480px;
    color: #b0a898;
    margin-bottom: 3.5rem;
    opacity: 0;
    animation: fadeUp 1s ease 0.9s forwards;
  }
  .btn {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    background: transparent;
    border: 1px solid var(--gold-dim);
    padding: 1rem 2.5rem;
    cursor: pointer;
    transition: all 0.4s ease;
    opacity: 0;
    animation: fadeUp 1s ease 1.2s forwards;
  }
  .btn:hover {
    background: rgba(201,169,110,0.08);
    border-color: var(--gold);
    color: var(--cream);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Divider */
  .divider {
    width: 1px;
    height: 60px;
    background: linear-gradient(to bottom, transparent, var(--gold-dim), transparent);
    margin: 2rem auto;
  }

  /* Quiz */
  .quiz-wrap {
    width: 100%;
    max-width: 640px;
    margin: 0 auto;
  }
  .quiz-progress {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-align: center;
    margin-bottom: 3rem;
    text-transform: uppercase;
  }
  .progress-bar {
    width: 100%;
    height: 1px;
    background: rgba(255,255,255,0.06);
    margin-top: 1rem;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(to right, var(--gold-dim), var(--gold));
    transition: width 0.6s ease;
  }

  .question-scene {
    font-size: clamp(1.15rem, 2.5vw, 1.4rem);
    font-style: italic;
    font-weight: 300;
    line-height: 1.85;
    text-align: center;
    color: var(--cream);
    margin-bottom: 3.5rem;
    min-height: 5rem;
    transition: opacity 0.5s ease;
  }

  .slider-wrap {
    position: relative;
    padding: 0 0.5rem;
    margin-bottom: 2.5rem;
  }

  .slider-poles {
    display: flex;
    justify-content: space-between;
    margin-bottom: 1.2rem;
    gap: 2rem;
  }
  .pole {
    font-size: 0.9rem;
    font-weight: 300;
    line-height: 1.5;
    color: #7a7090;
    max-width: 44%;
    transition: color 0.3s ease;
  }
  .pole.left { text-align: left; }
  .pole.right { text-align: right; }
  .pole.active { color: var(--cream); }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 1px;
    background: transparent;
    position: relative;
    cursor: pointer;
  }
  .slider-track {
    position: relative;
    height: 1px;
    background: rgba(255,255,255,0.12);
    margin: 1.5rem 0;
  }
  .slider-track-fill {
    position: absolute;
    height: 100%;
    background: var(--gold-dim);
    top: 0;
    left: 50%;
    width: 0;
    transition: all 0.15s ease;
    pointer-events: none;
  }
  .slider-thumb-display {
    position: absolute;
    width: 18px;
    height: 18px;
    top: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    filter: drop-shadow(0 0 6px rgba(201,169,110,0.7)) drop-shadow(0 0 14px rgba(201,169,110,0.3));
    transition: left 0.05s ease;
    left: 50%;
  }
  .slider-thumb-display svg {
    width: 100%;
    height: 100%;
  }

  input[type=range] {
    position: absolute;
    inset: -12px 0;
    width: 100%;
    height: calc(100% + 24px);
    opacity: 0;
    cursor: pointer;
    z-index: 2;
  }

  .nav-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 2rem;
    margin-top: 2rem;
  }

  /* Result */
  .result-eyebrow {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.35em;
    color: var(--gold);
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 1.5rem;
  }
  .result-rave {
    font-family: 'Cinzel', serif;
    font-size: clamp(0.7rem, 1.5vw, 0.85rem);
    letter-spacing: 0.3em;
    color: var(--gold-dim);
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 1rem;
  }
  .result-archetype {
    font-size: clamp(3rem, 8vw, 5.5rem);
    font-style: italic;
    font-weight: 300;
    text-align: center;
    color: var(--cream);
    line-height: 1;
    margin-bottom: 1.5rem;
  }
  .result-desc {
    font-size: 1.1rem;
    font-weight: 300;
    line-height: 2;
    text-align: center;
    color: #9a9088;
    max-width: 460px;
    margin: 0 auto 3rem;
  }
  .result-glow {
    position: absolute;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,169,110,0.06) 0%, transparent 70%);
    pointer-events: none;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .result-image {
    width: 220px;
    height: 220px;
    margin: 0 auto 2rem;
    position: relative;
  }
  .result-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: grayscale(20%);
    transition: filter 0.4s ease;
  }
  .result-image img:hover { filter: grayscale(0%); }
  .result-image-placeholder {
    width: 100%;
    height: 100%;
    border: 1px solid var(--gold-dim);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    color: var(--gold-dim);
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    background: rgba(201,169,110,0.03);
  }
  .result-image-placeholder svg {
    opacity: 0.4;
  }

  .btn-share {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--bg);
    background: var(--gold);
    border: none;
    padding: 0.9rem 2rem;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin: 0 auto;
  }
  .btn-share:hover { background: var(--cream); }
  .btn-share svg { width: 13px; height: 13px; }

  .btn-ghost {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 0.5rem;
    transition: color 0.3s ease;
    display: block;
    margin: 0 auto;
  }
  .btn-ghost:hover { color: var(--cream); }

  .result-actions {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
    margin-top: 0.5rem;
  }
</style>
</head>
<body>

<canvas class="stars" id="stars"></canvas>

<!-- INTRO -->
<div class="screen active" id="screen-intro">
  <div class="intro-eyebrow">Stellium</div>
  <h1 class="intro-title">Which Rave<br>are you?</h1>
  <div class="divider"></div>
  <p class="intro-body">Ten questions. No right answers.<br>Only the one that already lives in you.</p>
  <button class="btn" onclick="startQuiz()">Begin</button>
</div>

<!-- QUIZ -->
<div class="screen" id="screen-quiz">
  <div class="quiz-wrap">
    <div class="quiz-progress">
      <span id="q-num">1</span> of 10
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:10%"></div></div>
    </div>
    <p class="question-scene" id="q-text"></p>
    <div class="slider-wrap">
      <div class="slider-poles">
        <span class="pole left" id="pole-left"></span>
        <span class="pole right" id="pole-right"></span>
      </div>
      <div class="slider-track">
        <div class="slider-track-fill" id="track-fill"></div>
        <div class="slider-thumb-display" id="thumb">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26" fill="#c9a96e" stroke="none"/>
          </svg>
        </div>
        <input type="range" id="slider" min="0" max="100" value="50" oninput="onSlide(this.value)">
      </div>
    </div>
    <div class="nav-row">
      <button class="btn-ghost" id="btn-back" onclick="prevQuestion()" style="display:none;">← Back</button>
      <button class="btn" onclick="nextQuestion()">Continue</button>
    </div>
  </div>
</div>

<!-- RESULT -->
<div class="screen" id="screen-result">
  <div class="result-glow"></div>
  <div class="result-eyebrow">Your Rave is</div>
  <div class="result-rave" id="r-rave"></div>
  <h2 class="result-archetype" id="r-archetype"></h2>
  <div class="result-image" id="r-image">
    <div class="result-image-placeholder" id="r-placeholder">
      <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="#c9a96e" stroke-width="1">
        <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/>
      </svg>
      Image coming soon
    </div>
    <img id="r-img" src="" alt="" style="display:none;">
  </div>
  <div class="divider"></div>
  <p class="result-desc" id="r-desc"></p>
  <div class="result-actions">
    <button class="btn" onclick="goToRave()">Meet your Rave</button>
    <button class="btn-share" onclick="shareResult()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
      </svg>
      Share my result
    </button>
    <button class="btn-ghost" onclick="restart()">Begin again</button>
  </div>
</div>

<script>
// Stars
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
let stars = [];
function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
function initStars() {
  stars = [];
  for (let i = 0; i < 120; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.2 + 0.3,
      op: Math.random() * 0.5 + 0.05,
      speed: Math.random() * 0.003 + 0.001,
      offset: Math.random() * Math.PI * 2
    });
  }
}
function drawStars(t) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let s of stars) {
    const op = s.op * (0.4 + 0.6 * (Math.sin(t * s.speed + s.offset) * 0.5 + 0.5));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${op})`;
    ctx.fill();
  }
  requestAnimationFrame(drawStars);
}
resizeCanvas(); initStars(); requestAnimationFrame(drawStars);
window.addEventListener('resize', () => { resizeCanvas(); initStars(); });

// Quiz data
const ARCHETYPES = {
  child:     { name: 'The Child',       rave: 'Rave 1', img: 'images/rave-1.jpg', desc: 'You carry wonder like a second skin. The world surprises you still — not because you are naive, but because you have refused to stop looking. There is a rawness in you that others have long since polished away.' },
  hero:      { name: 'The Hero',        rave: 'Rave 2', img: 'images/rave-2.jpg', desc: 'You move toward things, not away from them. Difficulty doesn\'t stop you — it orients you. You carry the quiet knowledge that the only way through is through, and somehow that has always been enough.' },
  wise:      { name: 'The Wise One',    rave: 'Rave 3', img: 'images/rave-3.jpg', desc: 'You know that the deepest answers arrive slowly. You have learned to wait, to listen, to hold silence like a gift. People feel steadier near you, often without knowing why.' },
  mother:    { name: 'The Great Mother',rave: 'Rave 4', img: 'images/rave-4.jpg', desc: 'You hold things. People, moments, grief, joy — all of it finds room in you. Your instinct is to tend, to shelter, to remain. You are the kind of presence that others only understand the weight of once you are gone.' },
  trickster: { name: 'The Trickster',   rave: 'Rave 5', img: 'images/rave-5.jpg', desc: 'You see the seam in every certainty. Rules interest you less than what breaks them. You move sideways through the world, and somehow that is almost always the right direction.' }
};

const QUESTIONS = [
  { scene: 'A small creature has built a nest in your shoe. You are already late.', left: 'You stay. Lateness is its own kind of time.', right: 'You find another shoe and go.', a: 'child', b: 'hero' },
  { scene: 'The moon asks you a question you don\'t understand.', left: 'You answer immediately, whatever comes out first.', right: 'You sit with it for three days before speaking.', a: 'child', b: 'wise' },
  { scene: 'It is raining inside your house. Just a little. Gently.', left: 'You open your mouth and taste it.', right: 'You quietly find a bowl, and leave it where it\'s needed most.', a: 'child', b: 'mother' },
  { scene: 'You find a door at the bottom of a lake. It is dry on the other side.', left: 'You swim down without thinking twice.', right: 'You wonder who put it there, and whether they\'re laughing.', a: 'child', b: 'trickster' },
  { scene: 'Something in the forest has been waiting for you. A long time.', left: 'You go in.', right: 'You sit at the edge and listen first.', a: 'hero', b: 'wise' },
  { scene: 'Someone falls asleep mid-sentence, telling you something important.', left: 'You stay awake in case they need to finish.', right: 'You cover them and decide the story can wait.', a: 'hero', b: 'mother' },
  { scene: 'You arrive exactly where you were going, but nothing looks the way you imagined.', left: 'You plant your feet and begin.', right: 'You decide this is better actually, and never mention the original plan.', a: 'hero', b: 'trickster' },
  { scene: 'A child asks you where the stars go in the daytime.', left: 'You tell them the true answer, slowly and completely.', right: 'You take their hand and watch the sky together until they forget they asked.', a: 'wise', b: 'mother' },
  { scene: 'You are given one word to leave behind when you are gone.', left: 'You choose it carefully, after a lifetime of thinking.', right: 'You leave a word no one expects. Maybe it isn\'t even a word.', a: 'wise', b: 'trickster' },
  { scene: 'A stranger arrives at your door in the middle of the night, carrying something wrapped in cloth.', left: 'You let them in and ask if they\'re hungry.', right: 'You swap what\'s in the cloth with something of your own while they sleep.', a: 'mother', b: 'trickster' }
];

let current = 0;
let scores = { child: 0, hero: 0, wise: 0, mother: 0, trickster: 0 };
let sliderVal = 50;
let answers = [];

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startQuiz() {
  current = 0;
  scores = { child: 0, hero: 0, wise: 0, mother: 0, trickster: 0 };
  answers = [];
  showScreen('screen-quiz');
  loadQuestion();
}

function loadQuestion() {
  const q = QUESTIONS[current];
  sliderVal = answers[current] !== undefined ? answers[current] : 50;
  const slider = document.getElementById('slider');
  slider.value = sliderVal;
  updateSliderUI(sliderVal);

  const qText = document.getElementById('q-text');
  qText.style.opacity = 0;
  setTimeout(() => {
    qText.textContent = q.scene;
    document.getElementById('pole-left').textContent = q.left;
    document.getElementById('pole-right').textContent = q.right;
    document.getElementById('q-num').textContent = current + 1;
    document.getElementById('progress-fill').style.width = ((current + 1) / 10 * 100) + '%';
    updatePoles(sliderVal);
    qText.style.opacity = 1;
  }, 300);

  document.getElementById('btn-back').style.display = current > 0 ? 'block' : 'none';
}

function onSlide(val) {
  sliderVal = parseInt(val);
  updateSliderUI(sliderVal);
  updatePoles(sliderVal);
}

function updateSliderUI(val) {
  const pct = val / 100;
  const thumb = document.getElementById('thumb');
  const fill = document.getElementById('track-fill');
  thumb.style.left = pct * 100 + '%';
  if (val < 50) {
    fill.style.left = pct * 100 + '%';
    fill.style.width = (50 - pct * 100) + '%';
  } else {
    fill.style.left = '50%';
    fill.style.width = (pct * 100 - 50) + '%';
  }
}

function updatePoles(val) {
  const left = document.getElementById('pole-left');
  const right = document.getElementById('pole-right');
  left.classList.toggle('active', val < 50);
  right.classList.toggle('active', val > 50);
}

function nextQuestion() {
  answers[current] = sliderVal;
  current++;
  if (current < QUESTIONS.length) {
    loadQuestion();
  } else {
    // Recompute scores from all answers
    scores = { child: 0, hero: 0, wise: 0, mother: 0, trickster: 0 };
    for (let i = 0; i < QUESTIONS.length; i++) {
      const q = QUESTIONS[i];
      const pct = (answers[i] !== undefined ? answers[i] : 50) / 100;
      scores[q.a] += (1 - pct);
      scores[q.b] += pct;
    }
    showResult();
  }
}

function prevQuestion() {
  answers[current] = sliderVal;
  current--;
  loadQuestion();
}

function showResult() {
  const winner = Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];
  const data = ARCHETYPES[winner];
  document.getElementById('r-rave').textContent = data.rave;
  document.getElementById('r-archetype').textContent = data.name;
  document.getElementById('r-desc').textContent = data.desc;

  const raveNum = { child: 1, hero: 2, wise: 3, mother: 4, trickster: 5 }[winner];
  document.getElementById('r-rave').dataset.num = raveNum;
  document.getElementById('r-rave').dataset.archetype = data.name;
  document.getElementById('r-rave').dataset.raveLabel = data.rave;

  // Image
  const img = document.getElementById('r-img');
  const placeholder = document.getElementById('r-placeholder');
  img.src = data.img;
  img.alt = data.name;
  img.onload = () => { img.style.display = 'block'; placeholder.style.display = 'none'; };
  img.onerror = () => { img.style.display = 'none'; placeholder.style.display = 'flex'; };

  showScreen('screen-result');
}

async function shareResult() {
  const btn = document.querySelector('.btn-share');
  const origHTML = btn.innerHTML;
  btn.innerHTML = '<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/></svg> Generating card…';
  btn.disabled = true;

  try {
    const raveLabel = document.getElementById('r-rave').dataset.raveLabel;
    const archetype = document.getElementById('r-rave').dataset.archetype;
    const num = document.getElementById('r-rave').dataset.num;
    const key = Object.keys(ARCHETYPES).find(k => ARCHETYPES[k].rave === raveLabel);
    const data = ARCHETYPES[key];

    const card = await generateStoryCard(data);

    card.toBlob(async (blob) => {
      const file = new File([blob], 'my-stellium-rave.png', { type: 'image/png' });

      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({
            files: [file],
            title: `I am ${archetype} — Stellium`,
            text: `I am ${archetype}. Find your Rave at davidacon.github.io`
          });
        } catch (e) {
          if (e.name !== 'AbortError') downloadCard(blob);
        }
      } else {
        // Desktop: download the card
        downloadCard(blob);
      }
      btn.innerHTML = origHTML;
      btn.disabled = false;
    }, 'image/png');

  } catch (e) {
    console.error(e);
    btn.innerHTML = origHTML;
    btn.disabled = false;
  }
}

function downloadCard(blob) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'my-stellium-rave.png';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

async function generateStoryCard(data) {
  const W = 1080, H = 1920;
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const cx = c.getContext('2d');

  // Background
  cx.fillStyle = '#09090f';
  cx.fillRect(0, 0, W, H);

  // Scattered stars
  for (let i = 0; i < 220; i++) {
    const x = Math.random() * W;
    const y = Math.random() * H;
    const r = Math.random() * 1.4 + 0.2;
    const op = Math.random() * 0.45 + 0.05;
    cx.beginPath();
    cx.arc(x, y, r, 0, Math.PI * 2);
    cx.fillStyle = `rgba(255,255,255,${op})`;
    cx.fill();
  }

  // Subtle gold vignette glow center
  const glow = cx.createRadialGradient(W/2, H/2, 100, W/2, H/2, 700);
  glow.addColorStop(0, 'rgba(201,169,110,0.04)');
  glow.addColorStop(1, 'transparent');
  cx.fillStyle = glow;
  cx.fillRect(0, 0, W, H);

  // Gold line helper
  const goldLine = (y) => {
    const g = cx.createLinearGradient(100, 0, W-100, 0);
    g.addColorStop(0, 'transparent');
    g.addColorStop(0.25, '#c9a96e');
    g.addColorStop(0.75, '#c9a96e');
    g.addColorStop(1, 'transparent');
    cx.strokeStyle = g;
    cx.lineWidth = 1;
    cx.beginPath(); cx.moveTo(100, y); cx.lineTo(W-100, y); cx.stroke();
  };

  await document.fonts.ready;

  // ── TOP BRANDING ──
  cx.textAlign = 'center';
  cx.fillStyle = '#c9a96e';
  cx.font = '400 58px Cinzel';
  cx.fillText('STELLIUM', W/2, 115);

  cx.fillStyle = '#5a5570';
  cx.font = '300 28px Cinzel';
  cx.fillText('HOMO SPIRITUS', W/2, 168);

  goldLine(200);

  // ── EYEBROW ──
  cx.fillStyle = '#7a6040';
  cx.font = '300 30px Cinzel';
  cx.fillText('YOUR RAVE IS', W/2, 264);

  cx.fillStyle = '#c9a96e';
  cx.font = '400 36px Cinzel';
  cx.fillText(data.rave.toUpperCase(), W/2, 316);

  // ── RAVE IMAGE ──
  const IMG_SIZE = 820;
  const IMG_X = (W - IMG_SIZE) / 2;
  const IMG_Y = 370;

  await new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      cx.save();
      cx.beginPath();
      cx.rect(IMG_X, IMG_Y, IMG_SIZE, IMG_SIZE);
      cx.clip();
      const scale = Math.max(IMG_SIZE / img.width, IMG_SIZE / img.height);
      const dw = img.width * scale;
      const dh = img.height * scale;
      cx.drawImage(img, IMG_X + (IMG_SIZE - dw) / 2, IMG_Y + (IMG_SIZE - dh) / 2, dw, dh);
      cx.restore();

      // Fade bottom of image into background
      const fade = cx.createLinearGradient(0, IMG_Y + IMG_SIZE - 180, 0, IMG_Y + IMG_SIZE);
      fade.addColorStop(0, 'rgba(9,9,15,0)');
      fade.addColorStop(1, 'rgba(9,9,15,1)');
      cx.fillStyle = fade;
      cx.fillRect(IMG_X, IMG_Y + IMG_SIZE - 180, IMG_SIZE, 180);

      resolve();
    };
    img.onerror = () => {
      // Placeholder: draw a gold star outline
      cx.save();
      cx.strokeStyle = '#3a3020';
      cx.lineWidth = 1;
      cx.strokeRect(IMG_X, IMG_Y, IMG_SIZE, IMG_SIZE);
      drawCanvasStar(cx, W/2, IMG_Y + IMG_SIZE/2, 120, '#7a6040');
      cx.restore();
      resolve();
    };
    img.src = data.img;
  });

  goldLine(1240);

  // ── ARCHETYPE NAME ──
  cx.fillStyle = '#f0e8d8';
  cx.font = 'italic 300 118px "Cormorant Garamond"';
  cx.fillText(data.name, W/2, 1370);

  // ── DESCRIPTION (wrapped, first ~2 lines) ──
  cx.fillStyle = '#8a8280';
  cx.font = '300 38px "Cormorant Garamond"';
  const maxLineW = 860;
  const words = data.desc.split(' ');
  let line = '', lines = [];
  for (const w of words) {
    const test = line ? line + ' ' + w : w;
    if (cx.measureText(test).width > maxLineW && line) { lines.push(line); line = w; }
    else { line = test; }
  }
  if (line) lines.push(line);
  lines.slice(0, 3).forEach((l, i) => {
    cx.fillText(l, W/2, 1470 + i * 64);
  });

  // ── BOTTOM ──
  goldLine(1720);

  // Small star
  drawCanvasStar(cx, W/2, 1780, 14, '#c9a96e');

  cx.fillStyle = '#5a5570';
  cx.font = '300 28px Cinzel';
  cx.fillText('davidacon.github.io', W/2, 1840);

  cx.fillStyle = '#3a3530';
  cx.font = '300 24px Cinzel';
  cx.fillText('Find your Rave', W/2, 1888);

  return c;
}

function drawCanvasStar(cx, x, y, r, color) {
  cx.save();
  cx.fillStyle = color;
  cx.beginPath();
  for (let i = 0; i < 5; i++) {
    const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
    const innerAngle = ((i * 4 + 2) * Math.PI) / 5 - Math.PI / 2;
    const px = x + r * Math.cos(angle);
    const py = y + r * Math.sin(angle);
    const ix = x + r * 0.4 * Math.cos(innerAngle);
    const iy = y + r * 0.4 * Math.sin(innerAngle);
    i === 0 ? cx.moveTo(px, py) : cx.lineTo(px, py);
    cx.lineTo(ix, iy);
  }
  cx.closePath();
  cx.fill();
  cx.restore();
}

function goToRave() {
  const num = document.getElementById('r-rave').dataset.num;
  window.open(`https://davidacon.github.io/rave-${num}.html`, '_blank');
}

function restart() {
  showScreen('screen-intro');
}
</script>
